spring.application.name=app

# --- H2 CONSOLE ACCESS ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- DATABASE CONNECTION ---
# Added ;NON_KEYWORDS=USER to prevent conflicts with 'user' tables
spring.datasource.url=jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=12345678

# --- JPA & HIBERNATE ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# --- UI & WEB SETTINGS ---
spring.h2.console.settings.web-allow-others=true
spring.thymeleaf.cache=false

# --- STATIC RESOURCES ---
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600
spring.servlet.mvc.hiddenmethod.filter.enabled=true

# --- LDAP CONFIGURATION ---
