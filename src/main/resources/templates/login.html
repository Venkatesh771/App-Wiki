<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - App Wiki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Open Sans", sans-serif;
            background: linear-gradient(145deg, #dff0f0 0%, #eef2f5 55%, #e4ecf5 100%);
        }

        .login-container {
            background: #fff;
            border-radius: 26px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.11), 0 4px 18px rgba(0, 0, 0, 0.06);
            padding: 2.4rem 1.9rem 2.2rem;
            width: 100%;
            max-width: 340px;
            margin: auto;
            animation: cardIn 0.45s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: scale(0.88) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .login-logo {
            height: 62px;
            width: auto;
            max-width: 72px;
            object-fit: contain;
            transition: transform 0.22s ease;
        }

        .login-logo:hover {
            transform: scale(1.06);
        }

        .login-app-title {
            font-family: "Quicksand", sans-serif;
            font-size: 1.45rem;
            font-weight: 700;
            color: #111;
            text-align: center;
            margin-bottom: 0.18rem;
            letter-spacing: 0.3px;
        }

        .login-subtitle {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-bottom: 1.8rem;
            font-weight: 400;
        }

        .login-error {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #fff5f5;
            border-left: 3px solid #e74c3c;
            border-radius: 10px;
            color: #c0392b;
            padding: 0.65rem 0.9rem;
            font-size: 0.82rem;
            margin-bottom: 1.1rem;
        }

        .login-field-group {
            background: #f5f5f7;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1.1rem;
        }

        .login-field {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0 0.95rem;
            height: 50px;
        }

        .login-field+.login-field {
            border-top: 1px solid #e5e5ea;
        }

        .login-field-icon {
            color: #008080;
            font-size: 0.82rem;
            width: 15px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .login-field input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.9rem;
            color: #111;
            outline: none;
            font-family: "Open Sans", sans-serif;
            height: 100%;
        }

        .login-field input::placeholder {
            color: #bbb;
        }

        .toggle-password {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #bbb;
            font-size: 0.85rem;
            line-height: 1;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .toggle-password:hover {
            color: #008080;
        }

        .btn-login {
            width: 100%;
            background: #008080;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 0.75rem;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            font-family: "Open Sans", sans-serif;
            letter-spacing: 0.2px;
            transition: background 0.18s ease, transform 0.14s ease, box-shadow 0.18s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
        }

        .btn-login:hover {
            background: #006666 !important;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18) !important;
            color: #fff !important;
        }

        .btn-login:active {
            transform: scale(0.97);
            background: #005555 !important;
        }

        .btn-login:focus,
        .btn-login:focus-visible,
        .btn-login:focus:not(:focus-visible) {
            background: #006666 !important;
            color: #fff !important;
            outline: none !important;
            box-shadow: 0 4px 16px rgba(0, 128, 128, 0.32) !important;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-webkit-contacts-auto-fill-button,
        input[type="password"]::-webkit-credentials-auto-fill-button {
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">

        <div class="login-header">
            <img src="/assets/Logo_Bayer.png" alt="Bayer Logo" class="login-logo">
        </div>

        <div class="login-app-title">App Wiki</div>
        <div class="login-subtitle">Sign in to continue</div>

        <div th:if="${error}" class="login-error" role="alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <form method="POST" action="/login">
            <div class="login-field-group">
                <div class="login-field">
                    <i class="fa-solid fa-id-card login-field-icon"></i>
                    <input type="text" id="cwid" name="cwid" placeholder="CWID" required autofocus>
                </div>
                <div class="login-field">
                    <i class="fa-solid fa-lock login-field-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword(event)">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(e) {
            e.preventDefault();
            e.stopPropagation();
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
