<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - App Wiki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Open Sans", sans-serif;
        }

        .login-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2.2rem;
            min-width: 320px;
            max-width: 350px;
            width: 100%;
            margin: auto;
        }

        .login-app-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 0.7rem;
            letter-spacing: 0.5px;
            color: #008080;
        }

        .login-title {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 1rem;
            text-align: center;
            color: #333;
        }

        .form-label {
            font-weight: 400;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 7px;
            border: 1.5px solid #d1d5db;
            box-shadow: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: #999;
            box-shadow: none;
            outline: none;
        }

        .btn-login {
            width: 100%;
            background: #008080;
            color: #fff;
            font-weight: 400;
            border-radius: 8px;
            margin-top: 1rem;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 128, 128, 0.07);
            transition: background 0.18s, box-shadow 0.18s, transform 0.15s, color 0.18s;
        }

        .btn-login:hover,
        .btn-login:focus {
            background: #006666;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 128, 128, 0.13);
            transform: translateY(-2px) scale(1.01);
            outline: none;
        }

        .alert {
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .login-logo {
            height: 65px;
            width: auto;
            max-width: 75px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .login-header:hover .login-logo {
            transform: scale(1.05);
        }

        .login-app-title-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="/assets/Logo_Bayer.png" alt="App Wiki Logo" class="login-logo">
        </div>
        <div class="login-app-title">App Wiki</div>
        <div class="login-title">Login</div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="cwid" class="form-label">CWID</label>
                <input type="text" class="form-control" id="cwid" name="cwid" placeholder="Enter your CWID" required
                    autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                    placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-login">Login</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
