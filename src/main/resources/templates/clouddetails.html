<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f2f2f7;
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .navbar {
            background: #000 !important;
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            min-height: 44px;
            height: 55px;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: "Quicksand", sans-serif;

        .navbar-brand:hover {

        }

        .navbar-brand-company {

            font-weight: 400;
            letter-spacing: 1.5px;
            font-family: "Open Sans", sans-serif;
            color: #fff;
        }

        .navbar-separator {
            color: #fff;
            margin: 0 0.2rem;
            opacity: 0.6;
        }

        .navbar-app-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }

        .navbar-logo {
            height: 33px;
            width: auto;
            max-width: 45px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .navbar-brand:hover .navbar-logo {
            transform: scale(1.05);
        }

        .navbar-brand-text {
            display: flex;
            flex-direction: column;
            gap: 0;
            line-height: 1.2;
        }

        .navbar-brand-pill {

            align-items: center;
            gap: 0.4rem;

            padding: 0.28rem 0.85rem;
            border-radius: 50px;
        }

        .user-icon-round {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #008080;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0;
            margin-right: 3px;
            font-family: "Quicksand", sans-serif;
            flex-shrink: 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .user-menu-trigger {
            display: flex !important;
            align-items: center;
            gap: 0.4rem;
            color: #fff !important;
            font-size: 0.85rem;

            margin-left: 1px;
        }

        .user-menu-caret.open {
            transform: rotate(180deg);
        }

        .profile-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            min-width: 230px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.88) translateY(-8px);
            transform-origin: top right;
            transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1050;
        }

        .profile-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);

            height: 44px;
            border-radius: 50%;

            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: "Quicksand", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .profile-info-name {
            font-size: 0.88rem;
            font-weight: 700;
            color: #111;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 145px;
        }

        .profile-info-role {
            display: inline-block;
            background: #e6f7f7;
            color: #008080;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            margin-top: 0.22rem;
            letter-spacing: 0.2px;
        }

        .profile-dropdown-divider {
            height: 1px;
            background: #f0f0f0;
        }

        .profile-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.1rem;
            color: #333;
            text-decoration: none !important;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: "Open Sans", sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .profile-dropdown-item:hover {
            background: #f7f7f7;
            color: #008080;
        }

        .profile-dropdown-item.logout-item {
            color: #e74c3c;
        }

        .profile-dropdown-item.logout-item:hover {
            background: #fff5f5;
            color: #c0392b;
        }

        .navbar-nav .nav-link {
            font-size: 0.85rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .navbar-nav {
            column-gap: 0.75rem;
        }

        .form-container {
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            margin: 0 auto;
            width: 95%;
        }

        .cloud-section {
            background: #fff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);

            padding: 28px 28px 24px;
            position: relative;
            padding-top: 52px;
        }

        .cloud-section:last-of-type {
            margin-bottom: 0;
        }

        .section-label {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1.5px solid #d1d1d6;
            padding: 5px 16px;
            border-radius: 50px;
            font-weight: 600;
            color: #008080;
            font-size: 0.78rem;
            letter-spacing: 0.2px;
            line-height: 1.4;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-add-section-row {
            background: #355E3B;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.58rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            line-height: 1;
            transition: background 0.2s;
        }

        .btn-add-section-row:hover {
            background: #27472c;
        }

        .row-container-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 15px;
        }

        .field-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        .field-item.select-field {
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            min-height: 36px;
        }

        .field-item.select-field label {
            height: 36px;
            display: flex;
            align-items: center;
            font-size: 14px !important;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
        }

        .field-item.account-id-field {
            grid-column: 1;
        }

        .field-item.host-type-field {
            grid-column: 2;
        }

        .field-item.service-name-field {
            grid-column: 3;
        }

        .field-item.lambda-field {
            grid-column: 1;
        }

        .field-item.s3-bucket-field {
            grid-column: 2;
        }

        .field-item.sqs-field {
            grid-column: 3;
        }

        .field-item.iam-user-field {
            grid-column: 1;
        }

        .field-item.comments-field {
            grid-column: 2;
        }

        .field-item label {
            font-weight: 500;
            font-size: 0.83rem;
            color: #666;
            margin: 0;
        }

        .field-item.select-field label {
            margin-bottom: 0;
            white-space: nowrap;
            order: 1;
            font-size: 0.75rem;
        }

        .field-item.select-field .row-select-checkbox {
            order: 2;
            margin: 0;
        }

        .field-item input:not([type="checkbox"]),
        .field-item select,
        .field-item textarea {
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 7px 12px;
            width: 100%;
            min-height: 36px;
            height: 36px;
            box-sizing: border-box;
            box-shadow: none !important;
            background-color: #e9ecef;
            font-size: 0.85rem;
            font-family: "Open Sans", sans-serif;
            color: #333;
            line-height: 1.4;
        }

        .field-item textarea {
            height: auto;
            min-height: 36px;
            resize: vertical;
        }

        .field-item input:focus,
        .field-item select:focus,
        .field-item textarea:focus {
            border-color: #b0b0b0 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            background-color: #fff;
        }

        .row-select-checkbox {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 36px;
            padding: 0;
            margin: 0;
        }

        .row-check {
            cursor: pointer;
            accent-color: #1b98e0;
            height: 12px !important;
            width: 12px !important;
        }

        .row-select-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        .btn-add {
            background-color: #355E3B;
            color: white;
            border: 1px solid #355E3B;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-right: 10px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-delete {
            background-color: #CD5C5C;
            color: white;
            border: 1px solid #CD5C5C;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-save-cloud {
            background: #008080;
            color: #fff;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease, box-shadow 0.18s ease;
        }

        .btn-save-cloud:hover {
            background: #006666;
        }

        .btn-save-cloud:active {
            transform: scale(0.96);
            background: #005555;
        }

        .btn-back {
            background: #e5e5ea;
            color: #444;
            border: none;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            text-decoration: none !important;
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease;
        }

        .btn-back:hover {
            background: #d1d1d6;
            color: #333;
        }

        .save-container {
            text-align: right;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f2f2f7;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        @media (max-width: 1200px) {
            .fields-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .fields-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 30px 20px;
            }

            .cloud-section {
                padding: 20px 15px;
                padding-top: 32px;
            }

            .field-item input:not([type="checkbox"]),
            .field-item select,
            .field-item textarea {
                height: 32px;
                padding: 6px 10px;
                font-size: 0.75rem;
            }

            .field-item label {
                font-size: 0.75rem;
            }

            .save-container {
                flex-direction: column;
                gap: 10px;
                margin-top: 30px;
                padding-top: 20px;
            }

            .btn-save-cloud,
            .btn-back {
                width: 100%;
                justify-content: center;
                padding: 8px 14px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 576px) {
            .fields-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .field-item input:not([type="checkbox"]),
            .field-item select,
            .field-item textarea {
                height: 30px;
                padding: 4px 8px;
                font-size: 0.7rem;
            }

            .field-item label {
                font-size: 0.7rem;
            }

            .form-container {
                padding: 20px 15px;
            }

            .cloud-section {
                padding: 15px 12px;
                padding-top: 28px;
            }

            .save-container {
                flex-direction: column;
                gap: 8px;
                margin-top: 20px;
                padding-top: 15px;
                border-top: 1px solid #e8eaef;
            }

            .btn-save-cloud,
            .btn-back {
                width: 100%;
                padding: 8px 12px;
                font-size: 0.65rem;
                border-radius: 5px;
            }
        }

        .data-saving-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #6c757d;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .data-saving-indicator.active {
            opacity: 1;
        }

        .data-saving-indicator .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #dee2e6;
            border-top-color: #1b98e0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast-notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast-notification.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .toast-notification.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .field-item select {
            padding-right: 32px !important;
            appearance: none !important;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important;
            background-repeat: no-repeat !important;
            background-position: right 8px center !important;
            background-size: 16px !important;
        }

        .custom-fields-in-grid {
            display: contents;
        }

        .custom-field-in-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .custom-field-in-grid label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0;
        }

        .custom-field-in-grid input:not([type="checkbox"]),
        .custom-field-in-grid select {
            border-radius: 6px;
            border: 1px solid #d1d5db;
            padding: 8px 12px;
            width: 100%;
            height: 36px;
            box-sizing: border-box;
            box-shadow: none !important;
            background-color: #e9ecef;
            font-size: 0.82rem;
        }

        .custom-field-in-grid input:focus,
        .custom-field-in-grid select:focus {
            border-color: #b0b0b0 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            background-color: #fff;
        }

        .custom-field-wrapper {
            position: relative;
            display: flex;
            gap: 6px;
            align-items: stretch;
            width: 100%;
        }

        .custom-field-input-group {
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        .custom-field-input-group input,
        .custom-field-input-group select {
            flex: 1;
            min-height: 36px;
        }

        .btn-delete-field {
            background-color: #ff6b6b;
            color: white;
            border: 1px solid #ff6b6b;
            border-radius: 6px;
            padding: 0;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            width: 38px;
            min-width: 38px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-delete-field:hover {
            background-color: #ff5252;
            border-color: #ff5252;
        }

        .btn-delete-field:active {
            transform: scale(0.95);
        }

        .btn-delete-field i {
            font-size: 0.9rem;
        }

        .input-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .input-modal-overlay.active {
            display: flex;
        }

        .input-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 90%;
            overflow: hidden;
        }

        .input-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
        }

        .input-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .input-modal-close:hover {
            color: #333;
        }

        .input-modal-body {
            padding: 20px;
        }

        .input-modal-body .form-control {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            height: 36px;
        }

        .input-modal-body .form-control:focus {

            height: 36px;
            border-radius: 8px;

            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-modal-footer .btn-primary {
            background: #1b98e0;
            color: white;

        .input-modal-footer .btn-primary:hover {
            background: #1585c5;
        }

    <script>

        function addRow(id) {
            createRow(id);
        }

        function createRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            let selectField = container.querySelector('.field-item.select-field');
            let fieldsGrid = container.querySelector('.fields-grid');

            if (!selectField || !fieldsGrid) return;

            let newSelectField = selectField.cloneNode(true);

            let newFieldsGrid = fieldsGrid.cloneNode(true);

            const selectInputs = newSelectField.querySelectorAll('input, select, textarea');
            selectInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            const gridInputs = newFieldsGrid.querySelectorAll('input, select, textarea');
            gridInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            container.appendChild(newSelectField);
            container.appendChild(newFieldsGrid);
        }

        function deleteRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            let selectFields = Array.from(container.querySelectorAll('.field-item.select-field'));
            let checkedIndices = [];

            selectFields.forEach((field, index) => {
                let checkbox = field.querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    checkedIndices.push(index);
                }
            });

            if (checkedIndices.length === 0) return;

            for (let i = checkedIndices.length - 1; i >= 0; i--) {
                let index = checkedIndices[i];
                let selectFieldToDelete = selectFields[index];
                let fieldsGridToDelete = selectFieldToDelete.nextElementSibling;

                selectFieldToDelete.remove();
                if (fieldsGridToDelete && fieldsGridToDelete.classList.contains('fields-grid')) {
                    fieldsGridToDelete.remove();
                }
            }
        }

    </script>

    <script>
        window.toggleProfileMenu = function (event) {
            event.preventDefault(); event.stopPropagation();
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            var open = d.classList.contains('open');
            d.classList.toggle('open', !open); c.classList.toggle('open', !open);
        };
        document.addEventListener('click', function (e) {
            var t = document.getElementById('profileTrigger');
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            if (d && !(t && t.contains(e.target))) { d.classList.remove('open'); if (c) c.classList.remove('open'); }
        });
    </script>
