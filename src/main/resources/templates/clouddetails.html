<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cloud Details | App Wiki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f0f2f5;
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar {
            background: #000 !important;
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: "Quicksand", sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            margin-left: 1.5rem;
        }

        .navbar-nav .nav-link {
            font-size: 0.85rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .navbar-nav {
            column-gap: 0.75rem;
        }

        .form-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: 30px auto;
            width: 95%;
        }

        .cloud-section {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
            position: relative;
        }

        .section-label {
            position: absolute;
            top: -15px;
            left: 20px;
            background: #fff;
            border: 1px solid #ddd;
            color: #333;
            padding: 3px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .row-container-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 15px;
        }

        .field-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        .field-item.select-field {
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            min-height: 36px;
        }

        .field-item.select-field label {
            height: 36px;
            display: flex;
            align-items: center;
            font-size: 14px !important;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
        }

        .field-item.account-id-field {
            grid-column: 1;
        }

        .field-item.host-type-field {
            grid-column: 2;
        }

        .field-item.service-name-field {
            grid-column: 3;
        }

        .field-item.lambda-field {
            grid-column: 1;
        }

        .field-item.s3-bucket-field {
            grid-column: 2;
        }

        .field-item.sqs-field {
            grid-column: 3;
        }

        .field-item.iam-user-field {
            grid-column: 1;
        }

        .field-item.comments-field {
            grid-column: 2;
        }

        .field-item label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0;
        }

        .field-item.select-field label {
            margin-bottom: 0;
            white-space: nowrap;
            order: 1;
            font-size: 0.75rem;
        }

        .field-item.select-field .row-select-checkbox {
            order: 2;
            margin: 0;
        }

        .field-item input:not([type="checkbox"]),
        .field-item select,
        .field-item textarea {
            border-radius: 6px;
            border: 1px solid #d1d5db;
            padding: 8px 12px;
            width: 100%;
            min-height: 36px;
            height: 36px;
            box-sizing: border-box;
            box-shadow: none !important;
            background-color: #e9ecef;
            font-size: 0.82rem;
            line-height: 1.4;
        }

        .field-item textarea {
            height: auto;
            min-height: 36px;
            resize: vertical;
        }

        .field-item input:focus,
        .field-item select:focus,
        .field-item textarea:focus {
            border-color: #b0b0b0 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            background-color: #fff;
        }

        .row-select-checkbox {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 36px;
            padding: 0;
            margin: 0;
        }

        .row-check {
            cursor: pointer;
            accent-color: #1b98e0;
            height: 12px !important;
            width: 12px !important;
        }

        .row-select-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        .btn-add {
            background-color: #355E3B;
            color: white;
            border: 1px solid #355E3B;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-right: 10px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-delete {
            background-color: #CD5C5C;
            color: white;
            border: 1px solid #CD5C5C;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-save-cloud {
            background: #1b98e0;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #1b98e0;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        .btn-save-cloud:hover {
            background: #1585c5;
            border-color: #1585c5;
            color: white;
        }

        .btn-back {
            background: #6c757d;
            color: white;
            border: 1px solid #6c757d;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
            cursor: pointer;
            text-decoration: none !important;
        }

        .btn-back:hover {
            background: #5a6268;
            border-color: #5a6268;
            color: white;
            text-decoration: none;
        }

        .save-container {
            text-align: right;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e8eaef;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        @media (max-width: 1200px) {
            .fields-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .fields-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 30px 20px;
            }

            .cloud-section {
                padding: 20px 15px;
            }

            .field-item input:not([type="checkbox"]),
            .field-item select,
            .field-item textarea {
                height: 32px;
                padding: 6px 10px;
                font-size: 0.75rem;
            }

            .field-item label {
                font-size: 0.75rem;
            }

            .save-container {
                flex-direction: column;
                gap: 10px;
                margin-top: 30px;
                padding-top: 20px;
            }

            .btn-save-cloud,
            .btn-back {
                width: 100%;
                justify-content: center;
                padding: 8px 14px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 576px) {
            .fields-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .field-item input:not([type="checkbox"]),
            .field-item select,
            .field-item textarea {
                height: 30px;
                padding: 4px 8px;
                font-size: 0.7rem;
            }

            .field-item label {
                font-size: 0.7rem;
            }

            .form-container {
                padding: 20px 15px;
            }

            .cloud-section {
                padding: 15px 12px;
            }

            .save-container {
                flex-direction: column;
                gap: 8px;
                margin-top: 20px;
                padding-top: 15px;
                border-top: 1px solid #e8eaef;
            }

            .btn-save-cloud,
            .btn-back {
                width: 100%;
                padding: 8px 12px;
                font-size: 0.65rem;
                border-radius: 5px;
            }
        }

        /* Data Saving Indicator */
        .data-saving-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #6c757d;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .data-saving-indicator.active {
            opacity: 1;
        }

        .data-saving-indicator .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #dee2e6;
            border-top-color: #1b98e0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast Notifications */
        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast-notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast-notification.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .toast-notification.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Select Field Padding */
        .field-item select {
            padding-right: 32px !important;
            appearance: none !important;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important;
            background-repeat: no-repeat !important;
            background-position: right 8px center !important;
            background-size: 16px !important;
        }

        /* Custom fields container for cloud rows */
        .custom-fields-in-grid {
            display: contents;
        }

        /* Single custom field item in grid */
        .custom-field-in-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .custom-field-in-grid label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0;
        }

        .custom-field-in-grid input:not([type="checkbox"]),
        .custom-field-in-grid select {
            border-radius: 6px;
            border: 1px solid #d1d5db;
            padding: 8px 12px;
            width: 100%;
            height: 36px;
            box-sizing: border-box;
            box-shadow: none !important;
            background-color: #e9ecef;
            font-size: 0.82rem;
        }

        .custom-field-in-grid input:focus,
        .custom-field-in-grid select:focus {
            border-color: #b0b0b0 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            background-color: #fff;
        }

        .custom-field-wrapper {
            position: relative;
            display: flex;
            gap: 6px;
            align-items: stretch;
            width: 100%;
        }

        .custom-field-input-group {
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        .custom-field-input-group input,
        .custom-field-input-group select {
            flex: 1;
            min-height: 36px;
        }

        .btn-delete-field {
            background-color: #ff6b6b;
            color: white;
            border: 1px solid #ff6b6b;
            border-radius: 6px;
            padding: 0;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            width: 38px;
            min-width: 38px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-delete-field:hover {
            background-color: #ff5252;
            border-color: #ff5252;
        }

        .btn-delete-field:active {
            transform: scale(0.95);
        }

        .btn-delete-field i {
            font-size: 0.9rem;
        }

        /* Input Modal Styles */
        .input-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .input-modal-overlay.active {
            display: flex;
        }

        .input-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 90%;
            overflow: hidden;
        }

        .input-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
        }

        .input-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .input-modal-close:hover {
            color: #333;
        }

        .input-modal-body {
            padding: 20px;
        }

        .input-modal-body .form-control {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            height: 36px;
        }

        .input-modal-body .form-control:focus {
            background-color: #fff;
            border-color: #1b98e0;
            box-shadow: 0 0 0 3px rgba(27, 152, 224, 0.1);
            outline: none;
        }

        .input-modal-footer {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .input-modal-footer button {
            padding: 8px 20px;
            height: 36px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-modal-footer .btn-primary {
            background: #1b98e0;
            color: white;
        }

        .input-modal-footer .btn-primary:hover {
            background: #1585c5;
        }

        .input-modal-footer .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .input-modal-footer .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Field Modal Styles */
        .field-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10001;
            align-items: center;
            justify-content: center;
        }

        .field-modal-overlay.active {
            display: flex;
        }

        .field-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 380px;
            width: 90%;
            overflow: hidden;
        }

        .field-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .field-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .field-modal-close:hover {
            color: #333;
        }

        .field-modal-body {
            padding: 16px;
        }

        .field-type-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-type-btn {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            color: #333;
            height: 40px;
        }

        .field-type-btn:hover {
            border-color: #1b98e0;
            background: #f0f8ff;
            color: #1b98e0;
        }

        .field-type-btn:active {
            transform: scale(0.98);
        }

        .field-type-btn i {
            font-size: 1rem;
        }

        .field-modal-body .form-control,
        .field-modal-body textarea {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .field-modal-body textarea {
            min-height: 80px;
            resize: vertical;
        }

        .field-modal-body .form-control:focus,
        .field-modal-body textarea:focus {
            background-color: #fff;
            border-color: #1b98e0;
            box-shadow: 0 0 0 3px rgba(27, 152, 224, 0.1);
            outline: none;
        }

        .field-modal-note {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 12px;
            font-style: italic;
        }

        .field-modal-actions {
            display: flex;
            gap: 8px;

        }

        .field-modal-actions button {

            height: 36px;

            border: none;
            font-size: 0.9rem;

        .field-modal-actions .btn-secondary {

        }

        .field-modal-actions .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Confirmation Modal - Delete Field */
        .confirmation-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10002;
            align-items: center;
            justify-content: center;
        }

        .confirmation-modal-overlay.active {
            display: flex;
        }

        .confirmation-modal-content {

            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);

            padding: 20px 20px 0;

        .confirmation-modal-header h4 {
            margin: 0;

        }

        .confirmation-modal-close {

            border: none;

            padding: 0;
            width: 30px;

            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .confirmation-modal-close:hover {
            color: #333;
        }

        .confirmation-modal-body {
            padding: 20px;
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .confirmation-modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding: 0 20px 20px;
        }

        .confirmation-modal-actions button {
            padding: 8px 20px;
            height: 36px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .confirmation-modal-actions .btn-delete-confirm {

    <script>
        // Add/Delete row functionality for grid layout
        function addRow(id) {
            createRow(id);
        }

        function createRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            // Get the first complete row structure (select-field + fields-grid)
            let selectField = container.querySelector('.field-item.select-field');
            let fieldsGrid = container.querySelector('.fields-grid');

            if (!selectField || !fieldsGrid) return;

            // Clone the SELECT field
            let newSelectField = selectField.cloneNode(true);

            // Clone the fields grid with all its children
            let newFieldsGrid = fieldsGrid.cloneNode(true);

            // Clear all input values in new select field
            const selectInputs = newSelectField.querySelectorAll('input, select, textarea');
            selectInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            // Clear all input values in new fields grid
            const gridInputs = newFieldsGrid.querySelectorAll('input, select, textarea');
            gridInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            // Add both new elements to container
            container.appendChild(newSelectField);
            container.appendChild(newFieldsGrid);
        }

        function deleteRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            // Find checked checkboxes in select-field items
            let selectFields = Array.from(container.querySelectorAll('.field-item.select-field'));
            let checkedIndices = [];

            selectFields.forEach((field, index) => {
                let checkbox = field.querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    checkedIndices.push(index);
                }
            });

            if (checkedIndices.length === 0) return;

            // Delete from last to first to avoid index issues
            for (let i = checkedIndices.length - 1; i >= 0; i--) {
                let index = checkedIndices[i];
                let selectFieldToDelete = selectFields[index];
                let fieldsGridToDelete = selectFieldToDelete.nextElementSibling;

                selectFieldToDelete.remove();
                if (fieldsGridToDelete && fieldsGridToDelete.classList.contains('fields-grid')) {
                    fieldsGridToDelete.remove();
                }
            }
        }

        // Cloud Details page initialization is already done at top of file
    </script>
