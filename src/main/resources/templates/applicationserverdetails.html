<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>App Server Details - App Wiki</title>
    <link rel="icon" type="image/png" th:href="@{/assets/app1.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f2f2f7;
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .navbar {
            background: #000 !important;
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            min-height: 44px;
            height: 55px;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: "Quicksand", sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            margin-left: 1.5rem;
            line-height: 1.1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .navbar-brand:hover {
            opacity: 0.8;
        }

        .navbar-brand-company {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            font-family: "Open Sans", sans-serif;
            color: #fff;
        }

        .navbar-separator {
            color: #fff;
            margin: 0 0.2rem;
            opacity: 0.6;
        }

        .navbar-app-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }

        .navbar-logo {
            height: 33px;
            width: auto;
            max-width: 45px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .navbar-brand:hover .navbar-logo {
            transform: scale(1.05);
        }

        .navbar-brand-text {
            display: flex;
            flex-direction: column;
            gap: 0;
            line-height: 1.2;
        }

        .navbar-brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(173, 216, 230, 0.22);
            border: 1px solid rgba(173, 216, 230, 0.38);
            padding: 0.28rem 0.85rem;
            border-radius: 50px;
        }

        .user-icon-round {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #008080;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0;
            margin-right: 3px;
            font-family: "Quicksand", sans-serif;
            flex-shrink: 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .user-menu-trigger {
            display: flex !important;
            align-items: center;
            gap: 0.4rem;
            color: #fff !important;
            font-size: 0.85rem;
            text-decoration: none;
            padding: 0.22rem 0.7rem 0.22rem 0.3rem !important;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.18) !important;
            transition: background 0.15s ease;
        }

        .user-menu-trigger:hover {
            background: rgba(255, 255, 255, 0.26) !important;
        }

        .user-menu-caret {
            font-size: 0.62rem;
            opacity: 0.75;
            transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
            margin-left: 1px;
        }

        .user-menu-caret.open {
            transform: rotate(180deg);
        }

        .profile-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            min-width: 230px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.88) translateY(-8px);
            transform-origin: top right;
            transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1050;
        }

        .profile-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .profile-dropdown-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.1rem 0.85rem;
        }

        .profile-avatar-lg {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #008080;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: "Quicksand", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .profile-info-name {
            font-size: 0.88rem;
            font-weight: 700;
            color: #111;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 145px;
        }

        .profile-info-role {
            display: inline-block;
            background: #e6f7f7;
            color: #008080;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            margin-top: 0.22rem;
            letter-spacing: 0.2px;
        }

        .profile-dropdown-divider {
            height: 1px;
            background: #f0f0f0;
        }

        .profile-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.1rem;
            color: #333;
            text-decoration: none !important;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: "Open Sans", sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .profile-dropdown-item:hover {
            background: #f7f7f7;
            color: #008080;
        }

        .profile-dropdown-item.logout-item {
            color: #e74c3c;
        }

        .profile-dropdown-item.logout-item:hover {
            background: #fff5f5;
            color: #c0392b;
        }

        .navbar-nav .nav-link {
            font-size: 0.85rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .navbar-nav {
            column-gap: 0.75rem;
        }

        .sidebar-left {
            display: none;
        }

        .main-content {
            margin-left: 0;
            padding: 0 30px 24px;
        }

        .form-container {
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            margin: 0 auto;
            width: 100%;
        }

        .section-box {
            background: #fff;
            border: none;
            border-radius: 20px;
            padding: 28px 28px 24px;
            margin-bottom: 40px;
            position: relative;
            padding-top: 52px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .section-box:last-of-type {
            margin-bottom: 0;
        }

        .section-label {
            background: #fff;
            border: 1.5px solid #d1d1d6;
            padding: 5px 16px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            color: #008080;
            font-size: 0.78rem;
            line-height: 1.4;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }

        .btn-add-section-row {
            background: #355E3B;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.58rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            line-height: 1;
            transition: background 0.2s;
        }

        .btn-add-section-row:hover {
            background: #27472c;
        }

        .row-check {
            cursor: pointer;
            accent-color: #1b98e0;
            height: 12px !important;
            width: 12px !important;
        }

        .table-custom {
            display: none;
        }

        .row-container-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 15px;
        }

        .field-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        .field-item.select-field {
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            min-height: 36px;
        }

        .field-item.select-field label {
            height: 36px;
            display: flex;
            align-items: center;
            font-size: 14px !important;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
        }

        .field-item.deployed-server-field {
            grid-column: 1;
        }

        .field-item.server-name-field {
            grid-column: 2;
        }

        .field-item.server-os-field {
            grid-column: 3;
        }

        .field-item.domain-field {
            grid-column: 1;
        }

        .field-item.cluster-field {
            grid-column: 2;
        }

        .field-item.service-name-field {
            grid-column: 3;
        }

        .field-item.ip-address-field {
            grid-column: 1;
        }

        .field-item label {
            font-weight: 500;
            font-size: 0.83rem;
            color: #666;
            margin: 0;
        }

        .field-item.select-field label {
            margin-bottom: 0;
            white-space: nowrap;
            order: 1;
            font-size: 0.75rem;
        }

        .field-item.select-field .row-select-checkbox {
            order: 2;
            margin: 0;
        }

        .field-item input:not([type="checkbox"]),
        .field-item select,
        .field-item textarea {
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 7px 12px;
            width: 100%;
            min-height: 36px;
            height: 36px;
            box-sizing: border-box;
            box-shadow: none !important;
            background-color: #e9ecef;
            font-size: 0.85rem;
            font-family: "Open Sans", sans-serif;
            color: #333;
            line-height: 1.4;
        }

        .field-item textarea {
            height: auto;
            min-height: 36px;
            resize: vertical;
        }

        .field-item input:focus,
        .field-item select:focus,
        .field-item textarea:focus {
            background-color: #fff;
            border-color: #b0b0b0 !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            outline: none !important;
        }

        .row-select-checkbox {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 36px;
            padding: 0;
            margin: 0;
        }

        .row-select-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        .btn-add {
            background-color: #355E3B;
            color: white;
            border: 1px solid #355E3B;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-right: 10px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-delete {
            background-color: #CD5C5C;
            color: white;
            border: 1px solid #CD5C5C;
            border-radius: 10px;
            font-size: 0.68rem;
            padding: 6px 15px;
            font-weight: 500;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-save-final {
            background: #008080;
            color: #fff;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.2px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease, box-shadow 0.18s ease;
        }

        .btn-save-final:hover {
            background: #006666;
            color: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        }

        .btn-save-app-server {
            background: #008080;
            color: #fff;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.2px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease, box-shadow 0.18s ease;
        }

        .btn-save-app-server:hover {
            background: #006666;
            color: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        }

        .btn-save-app-server:active {
            transform: scale(0.96);
            background: #005555;
        }

        .save-container {
            text-align: right;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f2f2f7;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        .fw-bold.text-success {
            color: #000 !important;
        }

        .btn-save-final i.fa-backward {
            font-size: 0.9rem;
        }

        .btn-back {
            background: #e5e5ea;
            color: #444;
            border: none;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.2px;
            cursor: pointer;
            text-decoration: none !important;
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease;
        }

        .btn-back:hover {
            background: #d1d1d6;
            color: #333;
            text-decoration: none;
        }

        .btn-back:active {
            transform: scale(0.96);
        }

        @media (max-width: 1200px) {
            .fields-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .fields-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 30px 20px;
            }

            .section-box {
                padding: 20px 15px;
                padding-top: 32px;
            }

            .field-item input,
            .field-item select,
            .field-item textarea {
                height: 32px;
                padding: 6px 10px;
                font-size: 0.75rem;
            }

            .field-item label {
                font-size: 0.75rem;
            }

            .save-container {
                flex-direction: column;
                gap: 10px;
                margin-top: 30px;
                padding-top: 20px;
            }

            .btn-save-final,
            .btn-back {
                width: 100%;
                justify-content: center;
                padding: 8px 14px;
                font-size: 0.7rem;
            }

            .btn-save-final i,
            .btn-back i {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 576px) {
            .row-container-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .field-item input,
            .field-item select,
            .field-item textarea {
                height: 30px;
                padding: 4px 8px;
                font-size: 0.7rem;
            }

            .field-item label {
                font-size: 0.7rem;
            }

            .form-container {
                padding: 20px 15px;
            }

            .section-box {
                padding: 15px 12px;
                padding-top: 28px;
            }

            .save-container {
                flex-direction: column;
                gap: 8px;
                margin-top: 20px;
                padding-top: 15px;
                border-top: 1px solid #e8eaef;
            }

            .btn-save-final,
            .btn-back {
                width: 100%;
                padding: 8px 12px;
                font-size: 0.65rem;
                border-radius: 5px;
            }

            .btn-save-final span,
            .btn-back span {
                display: inline;
            }
        }

        .btn-save-final:focus,
        .btn-back:focus {
            outline: none;
        }

        .btn-save-final.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .btn-save-final.loading i {
            animation: spin-icon 1s linear infinite;
        }

        @keyframes spin-icon {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn-save-final.success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-color: #28a745;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .btn-save-final.error {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border-color: #dc3545;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast-notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast-notification.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .toast-notification.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .btn-add-option {
            background: #e5e5ea;
            color: #555;
            border: none;
            border-radius: 10px;
            padding: 6px 11px;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: background 0.2s ease, border-color 0.2s ease;
            flex-shrink: 0;
            min-width: 36px;
            height: 36px;
        }

        .btn-add-option:hover {
            background: #b8bcc4;
            border-color: #b8bcc4;
        }

        .btn-add-option:active {
            transform: scale(0.95);
        }

        .field-input.has-dropdown {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .field-input.has-dropdown .form-select {
            flex: 1;
        }

        .field-input .form-control {
            flex: 1;
        }

        .input-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .input-modal-overlay.active {
            display: flex;
        }

        .input-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 90%;
            overflow: hidden;
        }

        .input-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
        }

        .input-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .input-modal-close:hover {
            color: #333;
        }

        .input-modal-body {
            padding: 20px;
        }

        .input-modal-body .form-control {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            height: 36px;
        }

        .input-modal-body .form-control:focus {
            background-color: #fff;
            border-color: #1b98e0;
            box-shadow: 0 0 0 3px rgba(27, 152, 224, 0.1);
            outline: none;
        }

        .input-modal-footer {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .input-modal-footer button {
            padding: 8px 20px;
            height: 36px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-modal-footer .btn-primary {
            background: #1b98e0;
            color: white;
        }

        .input-modal-footer .btn-primary:hover {
            background: #1585c5;
        }

        .input-modal-footer .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .input-modal-footer .btn-secondary:hover {
            background: #e0e0e0;
        }

        .data-saving-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            background: white;

    <script>

        function addRow(id) {
            createRow(id);
        }

        function createRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            let selectField = container.querySelector('.field-item.select-field');
            let fieldsGrid = container.querySelector('.fields-grid');

            if (!selectField || !fieldsGrid) return;

            let newSelectField = selectField.cloneNode(true);

            let newFieldsGrid = fieldsGrid.cloneNode(true);

            const selectInputs = newSelectField.querySelectorAll('input, select, textarea');
            selectInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            const gridInputs = newFieldsGrid.querySelectorAll('input, select, textarea');
            gridInputs.forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });

            container.appendChild(newSelectField);
            container.appendChild(newFieldsGrid);
        }

        function deleteRow(id) {
            let container = document.querySelector(`#${id} .row-container-grid`);
            if (!container) return;

            let allItems = Array.from(container.querySelectorAll('.field-item'));
            let rowCount = allItems.length / 8;
            let checkedRows = [];

            for (let i = 0; i < rowCount; i++) {
                let checkbox = allItems[i * 8 + 0].querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    checkedRows.push(i);
                }
            }

            for (let i = checkedRows.length - 1; i >= 0; i--) {
                let rowIndex = checkedRows[i];
                for (let j = 0; j < 8; j++) {
                    let itemIndex = (rowIndex * 8) + j;
                    if (allItems[itemIndex]) {
                        allItems[itemIndex].remove();
                    }
                }
            }

            let currentRows = Math.ceil(container.querySelectorAll('.field-item').length / 8);
            allItems = Array.from(container.querySelectorAll('.field-item'));
            for (let i = 0; i < currentRows; i++) {
                let serverInput = allItems[i * 8 + 2]?.querySelector('.server-input');
                if (serverInput) {
                    serverInput.placeholder = 'Server ' + (i + 1);
                }
            }
        }

        class AppServerStorageManager {
            constructor() {
                this.STORAGE_KEY = 'appServerDetailsForm';
                this.SECTIONS = ['dev-section', 'test-section', 'qa-section', 'prod-section'];
            }

            collectFormData() {
                const data = {};

                this.SECTIONS.forEach(sectionId => {
                    const container = document.querySelector(`#${sectionId} .row-container-grid`);
                    if (container) {
                        data[sectionId] = [];
                        const items = Array.from(container.querySelectorAll('.field-item'));
                        const rowCount = Math.floor(items.length / 8);

                        for (let i = 0; i < rowCount; i++) {

                            const serverNameInput = items[i * 8 + 2].querySelector('input');
                            const serverName = serverNameInput?.value?.trim() || '';

                            if (!serverName) continue;

                            const rowData = {};
                            const environment = sectionId.split('-')[0].toUpperCase();
                            rowData['environment'] = environment;
                            rowData['serverName'] = serverName;
                            rowData['serverOsVersion'] = items[i * 8 + 3]?.querySelector('input')?.value?.trim() || '';
                            rowData['deployedServer'] = items[i * 8 + 1]?.querySelector('select')?.value?.trim() || '';
                            rowData['domain'] = items[i * 8 + 4]?.querySelector('input')?.value?.trim() || '';
                            rowData['cluster'] = items[i * 8 + 5]?.querySelector('input')?.value?.trim() || '';
                            rowData['serviceName'] = items[i * 8 + 6]?.querySelector('input')?.value?.trim() || '';
                            rowData['ipAddress'] = items[i * 8 + 7]?.querySelector('input')?.value?.trim() || '';

                            data[sectionId].push(rowData);
                        }
                    }
                });

                return data;
            }

            saveToLocalStorage() {
                try {
                    const data = this.collectFormData();
                    const storageData = {
                        data,
                        savedAt: new Date().toISOString(),
                        version: 1
                    }; localStorage.setItem(this.STORAGE_KEY, JSON.stringify(storageData));
                    console.log('App Server details saved to LocalStorage');
                    return true;
                } catch (e) {
                    console.error('Error saving to LocalStorage:', e);
                    this.showNotification('Failed to save to browser storage', 'error');
                    return false;
                }
            }

            restoreFromLocalStorage() {
                try {
                    const raw = localStorage.getItem(this.STORAGE_KEY);
                    if (!raw) {
                        console.log('ℹ No saved data in LocalStorage');
                        return;
                    }

                    const storageData = JSON.parse(raw);
                    const { data, savedAt } = storageData;

                    if (!data) return;

                    this.SECTIONS.forEach(sectionId => {
                        if (data[sectionId] && data[sectionId].length > 0) {
                            const container = document.querySelector(`#${sectionId} .row-container-grid`);
                            if (container) {

                                const items = Array.from(container.querySelectorAll('.field-item'));
                                for (let i = 8; i < items.length; i++) {
                                    items[i].remove();
                                }

                                data[sectionId].forEach((rowData) => {
                                    let templateItems = Array.from(container.querySelectorAll('.field-item')).slice(0, 8);
                                    let newRowItems = templateItems.map(item => item.cloneNode(true));

                                    newRowItems[1].querySelector('select').value = rowData.deployedServer || '';
                                    newRowItems[2].querySelector('input').value = rowData.serverName || '';
                                    newRowItems[3].querySelector('input').value = rowData.serverOsVersion || '';
                                    newRowItems[4].querySelector('input').value = rowData.domain || '';
                                    newRowItems[5].querySelector('input').value = rowData.cluster || '';
                                    newRowItems[6].querySelector('input').value = rowData.serviceName || '';
                                    newRowItems[7].querySelector('input').value = rowData.ipAddress || '';

                                    newRowItems.forEach(item => container.appendChild(item));
                                });
                            }
                        }
                    });

                    console.log(`✓ App Server details restored from LocalStorage (saved: ${new Date(savedAt).toLocaleString()})`);
                } catch (e) {
                    console.error('✗ Error restoring from LocalStorage:', e);
                }
            }

            async sendToBackend() {
                const data = this.collectFormData();

                try {
                    const requests = [];
                    let totalRecords = 0;

                    this.SECTIONS.forEach(sectionId => {
                        if (data[sectionId] && data[sectionId].length > 0) {
                            data[sectionId].forEach(rowData => {
                                totalRecords++;
                                requests.push(
                                    fetch('/api/application-server-details', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(rowData)
                                    })
                                );
                            });
                        }
                    });

                    if (requests.length === 0) {
                        this.showNotification('Please add at least one server entry', 'warning');
                        if (submitButton) {
                            submitButton.disabled = false;
                            submitButton.textContent = 'Save & Continue';
                        }
                        return false;
                    }

                    console.log(`Sending ${requests.length} records to backend...`);
                    const responses = await Promise.all(requests);
                    const allSuccess = responses.every(r => r.ok);

                    if (allSuccess) {
                        localStorage.setItem(this.STORAGE_KEY + '_lastSync', new Date().toISOString());
                        this.showNotification(`✓ ${totalRecords} server(s) saved successfully!`, 'success');
                        console.log('✓ All app server data sent to backend successfully');

                        setTimeout(() => {
                            window.location.href = '/clouddetails';
                        }, 2000);
                        return true;
                    } else {
                        const failedCount = responses.filter(r => !r.ok).length;
                        this.showNotification(`✗ Failed: ${failedCount} record(s) failed`, 'error');
                        console.error('✗ Some requests failed:', responses.map(r => r.status));
                        return false;
                    }
                } catch (error) {
                    console.error('✗ Error sending to backend:', error);
                    this.showNotification('✗ Error: ' + error.message, 'error');
                    return false;
                }
            }

            showNotification(message, type = 'info') {
                const notificationDiv = document.createElement('div');
                notificationDiv.className = `toast-notification ${type}`;
                notificationDiv.textContent = message;

                document.body.appendChild(notificationDiv);

                setTimeout(() => {
                    notificationDiv.remove();
                }, 5000);
            }

            init() {

                this.restoreFromLocalStorage();

                document.addEventListener('change', (e) => {
                    if (e.target.closest('table')) {
                        this.saveToLocalStorage();
                    }
                });

                document.addEventListener('input', (e) => {
                    if (e.target.closest('table')) {
                        this.saveToLocalStorage();
                    }
                }); window.addEventListener('beforeunload', () => {
                    this.saveToLocalStorage();
                });

                console.log('✓ App Server Storage Manager initialized');
            }
        }
        function collectAppServerFormData() {
            const data = {};
            const sections = ['dev-section', 'test-section', 'qa-section', 'prod-section'];

            sections.forEach(sectionId => {
                const section = document.getElementById(sectionId);
                if (section) {
                    const rows = [];
                    const container = section.querySelector('.row-container-grid');

                    if (container) {

                        const fieldGrids = container.querySelectorAll('.fields-grid');

                        fieldGrids.forEach(fieldsGrid => {

                            const rowData = {};
                            fieldsGrid.querySelectorAll('input, select, textarea').forEach((field, idx) => {
                                if (field.type === 'checkbox') {
                                    rowData['col_' + idx] = field.checked;
                                } else {
                                    rowData['col_' + idx] = field.value || '';
                                }
                            });

                            if (Object.values(rowData).some(v => v && v !== false)) {
                                rows.push(rowData);
                            }
                        });
                    }

                    data[sectionId] = rows;
                }
            });

            console.log('Collected App Server Form Data:', data);
            return data;
        }
        console.log('App Server Details page loading');

        function initializePage() {
            console.log('=== INITIALIZING APP SERVER PAGE ===');
            console.log('StorageManager exists:', !!window.StorageManager);
            console.log('ValidationManager exists:', !!window.ValidationManager);

            if (window.StorageManager) {
                console.log('Calling initAppServerPage()');
                window.StorageManager.initAppServerPage();
            } else {
                console.error('❌ StorageManager NOT FOUND - retrying in 500ms');
                setTimeout(initializePage, 500);
                return;
            }

            initializeButtonEnhancements();
            initializeKeyboardShortcuts();
            console.log('✅ App Server Page Initialized');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializePage);
        } else {
            initializePage();
        }
        function initializeButtonEnhancements() {
            const saveBtn = document.querySelector('.btn-save-app-server');
            const backBtn = document.querySelector('.btn-back');

            if (backBtn) {
                backBtn.addEventListener('mouseenter', function () {
                    this.style.textDecoration = 'none';
                });

                backBtn.addEventListener('mouseleave', function () {
                    this.style.textDecoration = 'none';
                });
            }
        }

        function initializeKeyboardShortcuts() {
            document.addEventListener('keydown', function (e) {

                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    const saveBtn = document.querySelector('.btn-save-app-server');
                    if (saveBtn && !saveBtn.disabled) {
                        saveBtn.click();
                    }
                }

                if (e.key === 'Escape') {
                    e.preventDefault();
                    const backBtn = document.querySelector('.btn-back');
                    if (backBtn) {
                        backBtn.click();
                    }
                }
            });
        }

        const style = document.createElement('style');
        style.textContent = `
            .btn-save-app-server {
                transition: none;
            }

            .btn-back {
                transition: none;
            }
        `;
        document.head.appendChild(style);
    </script>
    <script>
        window.toggleProfileMenu = function (event) {
            event.preventDefault(); event.stopPropagation();
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            var open = d.classList.contains('open');
            d.classList.toggle('open', !open); c.classList.toggle('open', !open);
        };
        document.addEventListener('click', function (e) {
            var t = document.getElementById('profileTrigger');
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            if (d && !(t && t.contains(e.target))) { d.classList.remove('open'); if (c) c.classList.remove('open'); }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
