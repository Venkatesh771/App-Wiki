            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;

        @keyframes slideIn {
            from {

                opacity: 0;

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {

                opacity: 1;

            to {

            }
        }

            color: #0c5460;

        @keyframes slideDown {

    <script>

        function addRow(sectionId) {
            createRow(sectionId);
        }

        function createRow(sectionId) {
            const container = document.querySelector(`#${sectionId} .row-container-grid`);
            const firstSelectField = container.querySelector('.field-item.select-field');
            const firstFieldsGrid = container.querySelector('.fields-grid');

            const newSelectField = firstSelectField.cloneNode(true);
            newSelectField.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.type === 'checkbox') el.checked = false;
                else el.value = '';
            });

            const newFieldsGrid = firstFieldsGrid.cloneNode(true);
            newFieldsGrid.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.type === 'checkbox') el.checked = false;
                else el.value = '';
            });

            container.appendChild(newSelectField);
            container.appendChild(newFieldsGrid);
        }

        function deleteRow(sectionId) {
            const container = document.querySelector(`#${sectionId} .row-container-grid`);
            const selectFields = container.querySelectorAll('.field-item.select-field');
            const checked = [...selectFields].filter(field => {
                const checkbox = field.querySelector('.row-check');
                return checkbox && checkbox.checked;
            });

            if (checked.length === 0 || selectFields.length <= 1) return;

            checked.forEach(selectField => {
                const nextFieldsGrid = selectField.nextElementSibling;
                selectField.remove();
                if (nextFieldsGrid && nextFieldsGrid.classList.contains('fields-grid')) {
                    nextFieldsGrid.remove();
                }
            });
        }    </script>

    <script>
        console.log('DB Server Details page loading - FINAL SAVE PAGE');

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () {
                console.log('DOM loaded - Initializing DB Server Page');

    <script>

        class DBServerStorageManager {
            constructor() {
                this.STORAGE_KEY = 'dbServerDetailsForm';
                this.SECTIONS = ['dev-section', 'test-section', 'qa-section', 'prod-section'];
            }

            collectFormData() {
                const data = {};

                this.SECTIONS.forEach(sectionId => {
                    const tbody = document.querySelector(`#${sectionId} .row-container`);
                    if (tbody) {
                        data[sectionId] = [];
                        tbody.querySelectorAll('tr').forEach(row => {
                            const inputs = row.querySelectorAll('input, select, textarea');

                            const dbName = inputs[4]?.value?.trim() || '';
                            if (!dbName) return;

                            const rowData = {};
                            const environment = sectionId.split('-')[0].toUpperCase();
                            rowData['environment'] = environment;
                            rowData['dbName'] = dbName;
                            rowData['serverName'] = inputs[5]?.value?.trim() || '';
                            rowData['hostName'] = inputs[6]?.value?.trim() || '';
                            rowData['portNumber'] = inputs[8]?.value?.trim() || '';
                            rowData['userName'] = inputs[5]?.value?.trim() || '';
                            rowData['password'] = inputs[9]?.value?.trim() || '';
                            rowData['comments'] = inputs[10]?.value?.trim() || '';
                            data[sectionId].push(rowData);
                        });
                    }
                });

                return data;
            }

            saveToLocalStorage() {
                try {
                    const data = this.collectFormData();
                    const storageData = {
                        data,
                        savedAt: new Date().toISOString(),
                        version: 1
                    };
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(storageData));
                    this.showSavingIndicator();
                    console.log('Ã¢Å“â€œ DB Server details saved to LocalStorage');
                    return true;
                } catch (e) {
                    console.error('Ã¢Å“â€” Error saving to LocalStorage:', e);
                    this.showNotification('Failed to save to browser storage', 'error');
                    return false;
                }
            }

            restoreFromLocalStorage() {
                try {
                    const raw = localStorage.getItem(this.STORAGE_KEY);
                    if (!raw) {
                        console.log('Ã¢â€žÂ¹ No saved data in LocalStorage');
                        return;
                    }

                    const storageData = JSON.parse(raw);
                    const { data, savedAt } = storageData;

                    if (!data) return;

                    this.SECTIONS.forEach(sectionId => {
                        if (data[sectionId] && data[sectionId].length > 0) {
                            const tbody = document.querySelector(`#${sectionId} .row-container`);
                            if (tbody) {

                                const templateRow = tbody.querySelector('tr');
                                if (!templateRow) return;

                                tbody.innerHTML = '';
                                data[sectionId].forEach((rowData, index) => {
                                    const newRow = templateRow.cloneNode(true);
                                    const inputs = newRow.querySelectorAll('input, select, textarea');

                                    inputs[1].value = rowData.dbName || '';
                                    inputs[2].value = rowData.serverName || '';
                                    inputs[3].value = rowData.hostName || '';
                                    inputs[4].value = rowData.portNumber || '';
                                    inputs[5].value = rowData.userName || '';
                                    inputs[6].value = rowData.password || '';
                                    inputs[7].value = rowData.comments || '';

                                    tbody.appendChild(newRow);
                                });
                            }
                        }
                    });

                    console.log(`Ã¢Å“â€œ DB Server details restored from LocalStorage (saved: ${new Date(savedAt).toLocaleString()})`);
                } catch (e) {
                    console.error('Ã¢Å“â€” Error restoring from LocalStorage:', e);
                }
            }
            async sendToBackend() {
                const data = this.collectFormData();
                const submitButton = document.querySelector('.btn-save-db');

                try {
                    if (submitButton) {
                        submitButton.disabled = true;
                        submitButton.textContent = 'Saving...';
                    }

                    const mainDetailsData = localStorage.getItem('app_mainDetails_form');
                    let basicIdentityId = null;
                    if (mainDetailsData) {
                        const parsed = JSON.parse(mainDetailsData);
                        basicIdentityId = parsed.basicIdentityId;
                    }

                    const bulkRequestData = {
                        basicIdentityId: basicIdentityId,
                        gridData: data
                    };

                    console.log('Sending bulk data:', bulkRequestData);

                    const response = await fetch('/api/database-server-details/bulk', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bulkRequestData)
                    });

                    const allSuccess = response.ok;

                    if (allSuccess) {
                        localStorage.setItem(this.STORAGE_KEY + '_lastSync', new Date().toISOString());

                        const appName = this.getApplicationName();
                        this.showSuccessPopup(appName);

                        console.log('Ã¢Å“â€œ All DB server data sent to backend successfully');
                        return true;
                    } else {
                        const failedCount = responses.filter(r => !r.ok).length;
                        this.showNotification(`Ã¢Å“â€” Failed: ${failedCount} record(s) failed`, 'error');
                        console.error('Ã¢Å“â€” Some requests failed:', responses.map(r => r.status));
                        return false;
                    }
                } catch (error) {
                    console.error('Ã¢Å“â€” Error sending to backend:', error);
                    this.showNotification('Ã¢Å“â€” Error: ' + error.message, 'error');
                    return false;
                } finally {
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.textContent = 'Save & Finish';
                    }
                }
            }

            showSavingIndicator() {
                const indicator = document.getElementById('savingIndicator');
                if (indicator) {
                    indicator.classList.add('active');

                    setTimeout(() => {
                        indicator.classList.remove('active');
                    }, 1500);
                }
            }

            showNotification(message, type = 'info') {
                const notificationDiv = document.createElement('div');
                notificationDiv.className = `toast-notification ${type}`;
                notificationDiv.textContent = message;

                document.body.appendChild(notificationDiv);

                setTimeout(() => {
                    notificationDiv.remove();
                }, 5000);
            }

            getApplicationName() {
                try {
                    const mainDetailsData = localStorage.getItem('mainDetailsForm');
                    if (mainDetailsData) {
                        const parsed = JSON.parse(mainDetailsData);
                        if (parsed.data && parsed.data.basicIdentity && parsed.data.basicIdentity.applicationName) {
                            return parsed.data.basicIdentity.applicationName;
                        }
                    }
                } catch (e) {
                    console.error('Error retrieving application name:', e);
                }
                return 'Application';
            }

            showSuccessPopup(applicationName) {

                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.4);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                `;

                const modal = document.createElement('div');
                modal.className = 'success-modal';
                modal.style.cssText = `
                    background: #ffffff;
                    border-radius: 16px;
                    padding: 30px 24px;
                    max-width: 280px;
                    width: 85%;
                    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.16);
                    text-align: center;
                    animation: slideDown 0.3s ease-out;
                    border: 1px solid rgba(0, 0, 0, 0.05);
                `;

                const appNameDiv = document.createElement('div');
                appNameDiv.style.cssText = `
                    font-size: 17px;
                    font-weight: 600;
                    color: #000;
                    margin-bottom: 8px;
                    line-height: 1.3;
                    word-break: break-word;
                `;
                appNameDiv.textContent = applicationName;

                const message = document.createElement('p');
                message.style.cssText = `
                    color: #666;
                    margin: 0;
                    font-size: 14px;
                    font-weight: 400;
                    line-height: 1.4;
                `;
                message.textContent = 'Added Successfully';

                const buttonContainer = document.createElement('div');
                buttonContainer.style.cssText = `
                    margin-top: 24px;
                    border-top: 1px solid #e5e5e5;
                    padding-top: 0;
                    display: flex;
                    justify-content: center;
                `;

                const okButton = document.createElement('button');
                okButton.textContent = 'OK';
                okButton.style.cssText = `
                    background: none;
                    color: #007AFF;
                    border: none;
                    padding: 12px 0;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                    width: 100%;
                    transition: background 0.1s ease;
                    border-radius: 0 0 16px 16px;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                `;

                okButton.onmouseover = () => {
                    okButton.style.background = 'rgba(0, 0, 0, 0.05)';
                };
                okButton.onmouseout = () => {
                    okButton.style.background = 'none';
                };
                okButton.ontouchstart = () => {
                    okButton.style.background = 'rgba(0, 0, 0, 0.05)';
                };
                okButton.ontouchend = () => {
                    okButton.style.background = 'none';
                };

                okButton.addEventListener('click', () => {
                    overlay.remove();

                    this.resetAllForms();
                    window.location.href = '/home';
                });

                modal.appendChild(appNameDiv);
                modal.appendChild(message);
                buttonContainer.appendChild(okButton);
                modal.appendChild(buttonContainer);

                overlay.appendChild(modal);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    if (overlay.parentElement) {
                        overlay.remove();

                        this.resetAllForms();
                        window.location.href = '/home';
                    }
                }, 10000);
            }

            resetAllForms() {
                try {

                    this.SECTIONS.forEach(sectionId => {
                        const tbody = document.querySelector(`#${sectionId} .row-container`);
                        if (tbody) {

                            const firstRow = tbody.querySelector('tr');
                            if (firstRow) {

                                firstRow.querySelectorAll('input, select, textarea').forEach(el => {
                                    if (el.type === 'checkbox') el.checked = false;
                                    else el.value = '';
                                });

                                while (tbody.rows.length > 1) {
                                    tbody.deleteRow(1);
                                }
                            }
                        }

                        localStorage.removeItem(sectionId + '-rowCount');
                    });

                    const allStorageKeys = [
                        'mainDetailsForm',
                        'mainDetailsLastSync',
                        'appServerDetailsForm',
                        'appServerDetailsLastSync',
                        'cloudDetailsForm',
                        'cloudDetailsLastSync',
                        'dbServerDetailsForm',
                        'dbServerDetailsLastSync'
                    ];

                    const sections = ['dev-section', 'test-section', 'qa-section', 'prod-section'];

                    sections.forEach(section => {
                        localStorage.removeItem('app-' + section + '-rowCount');
                    });

                    sections.forEach(section => {
                        localStorage.removeItem('cloud-' + section + '-rowCount');
                    });

                    allStorageKeys.forEach(key => {
                        localStorage.removeItem(key);
                    });

                    console.log('Ã¢Å“â€œ All forms reset and ALL localStorage data cleared');
                } catch (e) {
                    console.error('Ã¢Å“â€” Error resetting forms:', e);
                }
            }

            init() {

                this.restoreFromLocalStorage();

                document.addEventListener('change', (e) => {
                    if (e.target.closest('table')) {
                        this.saveToLocalStorage();
                    }
                });

                document.addEventListener('input', (e) => {
                    if (e.target.closest('table')) {
                        this.saveToLocalStorage();
                    }
                });

                window.addEventListener('beforeunload', () => {
                    this.saveToLocalStorage();
                });

                const submitButton = document.querySelector('.btn-save-db');
                if (submitButton) {
                    submitButton.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await this.sendToBackend();
                    });
                    console.log('Ã¢Å“â€œ Save button listener attached to btn-save-db');
                } else {
                    console.error('Ã¢Å“â€” Save button not found with selector .btn-save-db');
                }

                console.log('Ã¢Å“â€œ DB Server Storage Manager initialized');
            }
        }

    </script>
