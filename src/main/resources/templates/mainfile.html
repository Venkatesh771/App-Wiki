<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Application - App Wiki</title>
    <link rel="icon" type="image/png" th:href="@{/assets/app1.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f2f2f7;
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .navbar {
            background: #000 !important;
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            min-height: 44px;
            height: 55px;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: "Quicksand", sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            margin-left: 1.5rem;
            line-height: 1.1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .navbar-brand:hover {
            opacity: 0.8;
        }

        .navbar-brand-company {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            font-family: "Open Sans", sans-serif;
            color: #fff;
        }

        .navbar-separator {
            color: #fff;
            margin: 0 0.2rem;
            opacity: 0.6;
        }

        .navbar-app-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }

        .navbar-logo {
            height: 33px;
            width: auto;
            max-width: 45px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .navbar-brand:hover .navbar-logo {
            transform: scale(1.05);
        }

        .navbar-brand-text {
            display: flex;
            flex-direction: column;
            gap: 0;
            line-height: 1.2;
        }

        .navbar-brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(173, 216, 230, 0.22);
            border: 1px solid rgba(173, 216, 230, 0.38);
            padding: 0.28rem 0.85rem;
            border-radius: 50px;
        }

        .user-icon-round {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #008080;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 3px;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0;
            font-family: "Quicksand", sans-serif;
            flex-shrink: 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .user-menu-trigger {
            display: flex !important;
            align-items: center;
            gap: 0.4rem;
            color: #fff !important;
            font-size: 0.85rem;
            text-decoration: none;
            padding: 0.22rem 0.7rem 0.22rem 0.3rem !important;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.18) !important;
            transition: background 0.15s ease;
        }

        .user-menu-trigger:hover {
            background: rgba(255, 255, 255, 0.26) !important;
        }

        .user-menu-caret {
            font-size: 0.62rem;
            opacity: 0.75;
            transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
            margin-left: 1px;
        }

        .user-menu-caret.open {
            transform: rotate(180deg);
        }

        .profile-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            min-width: 230px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.88) translateY(-8px);
            transform-origin: top right;
            transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1050;
        }

        .profile-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .profile-dropdown-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.1rem 0.85rem;
        }

        .profile-avatar-lg {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #008080;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: "Quicksand", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .profile-info-name {
            font-size: 0.88rem;
            font-weight: 700;
            color: #111;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 145px;
        }

        .profile-info-role {
            display: inline-block;
            background: #e6f7f7;
            color: #008080;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            margin-top: 0.22rem;
            letter-spacing: 0.2px;
        }

        .profile-dropdown-divider {
            height: 1px;
            background: #f0f0f0;
        }

        .profile-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.1rem;
            color: #333;
            text-decoration: none !important;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: "Open Sans", sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .profile-dropdown-item:hover {
            background: #f7f7f7;
            color: #008080;
        }

        .profile-dropdown-item.logout-item {
            color: #e74c3c;
        }

        .profile-dropdown-item.logout-item:hover {
            background: #fff5f5;
            color: #c0392b;
        }

        .navbar-nav .nav-link {
            font-size: 0.85rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .navbar-nav {
            column-gap: 0.75rem;
        }

        .user-menu-wrapper {
            padding-right: 1.2rem;
        }

        .form-container {
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            margin: 0 auto;
            width: 95%;
        }

        .section-box {
            border: none;
            border-radius: 20px;
            padding: 28px 28px 24px;
            margin-bottom: 40px;
            background: #fff;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
            position: relative;
            padding-top: 52px;
        }

        .section-box:last-of-type {
            margin-bottom: 0;
        }

        .section-header {
            background: #fff;
            border: 1.5px solid #d1d1d6;
            padding: 5px 16px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            color: #008080;
            font-size: 0.78rem;
            line-height: 1.4;
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }

        .section-header-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0;
            margin-left: 0;
        }

        .form-group-custom {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .field-label {
            width: 40%;
            font-weight: 500;
            color: #666;
            font-size: 0.83rem;
            text-align: right;
            padding-right: 15px;
            line-height: 1.2;
        }

        .field-input {
            width: 60%;
        }

        .form-control,
        .form-select {
            background-color: #e9ecef;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 7px 12px;
            font-size: 0.85rem;
            font-family: "Open Sans", sans-serif;
            color: #333;
            transition: background-color 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            box-shadow: none;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #fff;
            border-color: #b0b0b0;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25) !important;
            outline: none !important;
        }

        .btn-save {
            background: #008080;
            color: #fff;
            padding: 0.55rem 1.4rem 0.55rem 1.1rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.2px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
            font-family: "Open Sans", sans-serif;
            transition: background 0.18s ease, transform 0.14s ease, box-shadow 0.18s ease;
        }

        .btn-save:hover {
            background: #006666;
            color: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        }

        .btn-save:active {
            transform: scale(0.96);
            background: #005555;
        }

        textarea.form-control {
            min-height: 60px;
        }

        .form-group-custom.app-description-row {
            align-items: center !important;
        }

        .data-saving-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #6c757d;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .data-saving-indicator.active {
            opacity: 1;
        }

        .data-saving-indicator .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #dee2e6;
            border-top-color: #1b98e0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast-notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast-notification.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .field-input {
            position: relative;
        }

        .field-input.has-dropdown {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .field-input.has-dropdown .form-select {
            flex: 1;
        }

        .field-input .form-control {
            flex: 1;
        }

        .form-group-custom .field-input {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .btn-add-option {
            background: #e5e5ea;
            color: #555;
            border: none;
            border-radius: 10px;
            padding: 6px 11px;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: background 0.18s ease, transform 0.14s ease;
            flex-shrink: 0;
        }

        .btn-add-option:hover {
            background: #d1d1d6;
        }

        .btn-add-option:active {
            transform: scale(0.94);
        }

        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #FF3B30 !important;
            background-color: #fff5f5 !important;
        }

        .form-control.is-invalid:focus,
        .form-select.is-invalid:focus {
            border-color: #FF3B30 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1) !important;
        }

        .input-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .input-modal-overlay.active {
            display: flex;
        }

        .input-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 90%;
            overflow: hidden;
            position: relative;
        }

        .input-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
        }

        .input-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .input-modal-close:hover {
            color: #333;
        }

        .input-modal-body {
            padding: 20px;
        }

        .input-modal-body .form-control {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 36px;
        }

        .input-modal-body .form-control:focus {
            background-color: #fff;
            border-color: transparent;
            box-shadow: 0 0 0 2.5px rgba(0, 128, 128, 0.28);
            outline: none;
        }

        .input-modal-footer {
            padding: 12px 0 0 0;
            display: flex;
            gap: 0;
            justify-content: stretch;
            align-items: stretch;
            border-top: 1px solid #e5e5ea;
        }

        .input-modal-footer button {
            flex: 1;
            padding: 12px 16px;
            height: 44px;
            border-radius: 0;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .input-modal-footer button:not(:last-child) {
            border-right: 1px solid #e5e5ea;
        }

        .input-modal-footer .btn-primary {
            background: #fff;
            color: #1b98e0;
        }

        .input-modal-footer .btn-primary:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-primary:hover {
            background: #f9f9f9;
        }

        .input-modal-footer .btn-secondary {
            background: #fff;
            color: #555;
        }

        .input-modal-footer .btn-secondary:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-secondary:hover {
            background: #f9f9f9;
        }

        .input-modal-footer .btn-delete-confirm {
            background: #fff;
            color: #ff3b30;
        }

        .input-modal-footer .btn-delete-confirm:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-delete-confirm:hover {
            background: #f9f9f9;
        }

        body.read-only-mode .form-control,
        body.read-only-mode .form-select,
        body.read-only-mode textarea.form-control {
            background-color: #f5f5f5 !important;
            color: #666;
            cursor: not-allowed;
        }

        body.read-only-mode .btn-delete-field {
            display: none !important;
        }

        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #FF3B30 !important;
            background-color: #ffe8e8 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1) !important;
        }

        .form-control.is-invalid:focus,
        .form-select.is-invalid:focus {
            border-color: #FF3B30 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.2) !important;
        }

        .toast-notification {
            display: none !important;
        }

        .data-saving-indicator {
            display: none !important;
        }

        .top-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 1.5rem 2.2rem;
        }

        .tab-pills-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-pill {
            border: none;
            background: #e5e5ea;
            color: #555;
            border-radius: 50px;
            padding: 0.4rem 1.1rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .tab-pill:hover {
            background: #d1d1d6;
            color: #333;
        }

        .tab-pill.active {
            background: #008080;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.13);
        }
    </style>
</head>

<body>

    <div class="data-saving-indicator" id="savingIndicator">
        <div class="spinner"></div>
        <span>Saving...</span>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">
                <span class="navbar-brand-pill">
                    <span class="navbar-brand-company">BAYER</span>
                    <span class="navbar-separator">|</span>
                    <span class="navbar-app-name">App Wiki</span>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center user-menu-wrapper">

                    <li class="nav-item user-menu" style="position:relative;">
                        <a class="nav-link user-menu-trigger" href="#" id="profileTrigger"
                            onclick="toggleProfileMenu(event)">
                            <span class="user-icon-round" th:text="${session.user != null ?
                                    #strings.toUpperCase(#strings.substring(session.user.username,0,1)) +
                                    (#strings.contains(session.user.username,' ') ?
                                      #strings.toUpperCase(#strings.substring(session.user.username,#strings.indexOf(session.user.username,' ')+1,#strings.indexOf(session.user.username,' ')+2))
                                      : '')
                                    : '?'}">AB</span>
                            <span th:text="${session.user != null ? session.user.username : 'Sample User'}">Sample
                                User</span>
                            <i class="fa-solid fa-chevron-down user-menu-caret" id="profileCaret"></i>
                        </a>
                        <div class="profile-dropdown" id="profileDropdown">
                            <div class="profile-dropdown-header">
                                <div class="profile-avatar-lg" th:text="${session.user != null ?
                                        #strings.toUpperCase(#strings.substring(session.user.username,0,1)) +
                                        (#strings.contains(session.user.username,' ') ?
                                          #strings.toUpperCase(#strings.substring(session.user.username,#strings.indexOf(session.user.username,' ')+1,#strings.indexOf(session.user.username,' ')+2))
                                          : '')
                                        : '?'}">AB</div>
                                <div>
                                    <div class="profile-info-name"
                                        th:text="${session.user != null ? session.user.username : 'Sample User'}">Sample
                                        User</div>
                                    <div class="profile-info-role"
                                        th:text="${session.user != null ? session.user.role : ''}">Role</div>
                                </div>
                            </div>
                            <div class="profile-dropdown-divider"></div>
                            <a href="/logout" class="profile-dropdown-item logout-item">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="top-header">
        <div class="tab-pills-container">
            <a class="tab-pill active" th:href="@{/mainfile}">Main Details</a>
            <a class="tab-pill" th:href="@{/applicationserverdetails}">Server Details</a>
            <a class="tab-pill" th:href="@{/clouddetails}">Cloud Details</a>
            <a class="tab-pill" th:href="@{/databaseserverdetails}">DB Server Details</a>
        </div>
    </div>

    <div class="container-fluid">
        <div class="form-container">
            <form>
                <div class="section-box">
                    <div class="section-header-wrapper">
                        <div class="section-header">Basic Identity</div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group-custom"><label class="field-label">Beat ID</label>
                                <div class="field-input"><input type="text" class="form-control" data-field="beatId">
                                </div>
                            </div>
                            <div class="form-group-custom"><label class="field-label">Appliction Name</label>
                                <div class="field-input"><input type="text" class="form-control"
                                        data-field="applicationName"></div>
                            </div>
                            <div class="form-group-custom"><label class="field-label">GxP</label>
                                <div class="field-input"><select class="form-select" data-field="gxp">

    <script>

        if (document.readyState === 'loading') {

    <script>
        window.toggleProfileMenu = function (event) {
            event.preventDefault(); event.stopPropagation();
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            var open = d.classList.contains('open');
            d.classList.toggle('open', !open); c.classList.toggle('open', !open);
        };
        document.addEventListener('click', function (e) {
            var t = document.getElementById('profileTrigger');
            var d = document.getElementById('profileDropdown');
            var c = document.getElementById('profileCaret');
            if (d && !(t && t.contains(e.target))) { d.classList.remove('open'); if (c) c.classList.remove('open'); }
        });
    </script>
