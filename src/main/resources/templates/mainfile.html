<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>App Wiki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap');

        body {
            background: #f0f2f5;
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar {
            background: #000 !important;
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: "Quicksand", sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            margin-left: 1.5rem;
        }

        .navbar-nav .nav-link {
            font-size: 0.85rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .navbar-nav {
            column-gap: 0.75rem;
        }

        .form-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: 30px auto;
            width: 95%;
        }

        .section-box {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            background: #fafafa;
            position: relative;
            padding-top: 35px;
        }

        .section-header {
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            color: #333;
            vertical-align: middle;
            font-size: 0.9rem;
            position: absolute;
            top: -18px;
            left: 18px;
        }

        .section-header-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0;
            margin-left: 0;
        }

        .form-group-custom {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .field-label {
            width: 40%;
            font-weight: 500;
            color: #444;
            font-size: 0.85rem;
            text-align: right;
            padding-right: 15px;
            line-height: 1.2;
        }

        .field-input {
            width: 60%;
        }

        .form-control,
        .form-select {
            background-color: #e9ecef;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.85rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #fff;
            border-color: #b0b0b0 !important;
            box-shadow: 0 0 0 2px rgba(176, 176, 176, 0.25);
            outline: none !important;
        }

        .btn-save {
            background: #1b98e0;
            color: rgb(255, 255, 255);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #1b98e0;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
            gap: 6px;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        .btn-save:hover {
            background: #1585c5;
            border-color: #1585c5;
            color: white;
        }

        textarea.form-control {
            min-height: 60px;
        }

        .form-group-custom.app-description-row {
            align-items: center !important;
        }

        /* Data Saving Indicator */
        .data-saving-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #6c757d;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .data-saving-indicator.active {
            opacity: 1;
        }

        .data-saving-indicator .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #dee2e6;
            border-top-color: #1b98e0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease forwards, slideOut 0.3s ease forwards 4.7s;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast-notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast-notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast-notification.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Dynamic Option Input Styles */
        .field-input {
            position: relative;
        }

        .field-input.has-dropdown {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .field-input.has-dropdown .form-select {
            flex: 1;
        }

        .field-input .form-control {
            flex: 1;
        }

        .form-group-custom .field-input {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .btn-add-option {
            background: #d1d5db;
            color: #333;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .btn-add-option:hover {
            background: #b8bcc4;
            border-color: #b8bcc4;
        }

        .btn-add-option:active {
            transform: scale(0.95);
        }

        /* Invalid Field Styling */
        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #FF3B30 !important;
            background-color: #fff5f5 !important;
        }

        .form-control.is-invalid:focus,
        .form-select.is-invalid:focus {
            border-color: #FF3B30 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1) !important;
        }

        /* Input Popup Modal */
        .input-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .input-modal-overlay.active {
            display: flex;
        }

        .input-modal-content {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 90%;
            overflow: hidden;
            position: relative;
        }

        .input-modal-header {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-modal-header h4 {
            margin: 0;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
        }

        .input-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .input-modal-close:hover {
            color: #333;
        }

        .input-modal-body {
            padding: 20px;
        }

        .input-modal-body .form-control {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 36px;
        }

        .input-modal-body .form-control:focus {
            background-color: #fff;
            border-color: #1b98e0;
            box-shadow: 0 0 0 3px rgba(27, 152, 224, 0.1);
            outline: none;
        }

        .input-modal-footer {
            padding: 12px 0 0 0;
            display: flex;
            gap: 0;
            justify-content: stretch;
            align-items: stretch;
            border-top: 1px solid #e5e5ea;
        }

        .input-modal-footer button {
            flex: 1;
            padding: 12px 16px;
            height: 44px;
            border-radius: 0;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .input-modal-footer button:not(:last-child) {
            border-right: 1px solid #e5e5ea;
        }

        .input-modal-footer .btn-primary {
            background: #fff;
            color: #1b98e0;
        }

        .input-modal-footer .btn-primary:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-primary:hover {
            background: #f9f9f9;
        }

        .input-modal-footer .btn-secondary {
            background: #fff;
            color: #555;
        }

        .input-modal-footer .btn-secondary:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-secondary:hover {
            background: #f9f9f9;
        }

        .input-modal-footer .btn-delete-confirm {
            background: #fff;
            color: #ff3b30;
        }

        .input-modal-footer .btn-delete-confirm:active {
            background: #f2f2f7;
        }

        .input-modal-footer .btn-delete-confirm:hover {
            background: #f9f9f9;
        }

        /* Read-only mode for non-Super Admin users */
        body.read-only-mode .form-control,
        body.read-only-mode .form-select,
        body.read-only-mode textarea.form-control {
            background-color: #f5f5f5 !important;
            color: #666;
            cursor: not-allowed;
        }

        body.read-only-mode .btn-delete-field {
            display: none !important;
        }

        /* Validation - Invalid field styling */
        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #FF3B30 !important;
            background-color: #ffe8e8 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1) !important;
        }

        .form-control.is-invalid:focus,
        .form-select.is-invalid:focus {
            border-color: #FF3B30 !important;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.2) !important;
        }

        /* Remove toasts and indicators - keep everything in modals */
        .toast-notification {
            display: none !important;
        }

        .data-saving-indicator {
            display: none !important;
        }
    </style>
</head>
